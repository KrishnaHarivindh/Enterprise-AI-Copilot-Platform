services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: enterprise-ai-copilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_ai_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-copilot_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copilot_admin} -d ${POSTGRES_DB:-enterprise_ai_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
